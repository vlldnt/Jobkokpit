# Production stack: Postgres + migrations + app (standalone) + Caddy (HTTPS)
# + sync worker + nightly backups.
#
#   cp .env.example .env   # fill secrets, set DOMAIN + DATABASE_URL (host: db)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# DATABASE_URL must point at the db service, e.g.:
#   postgresql://jobai:<pwd>@db:5432/jobai?schema=public
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-jobai}
    volumes:
      - jobai-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobai} -d ${POSTGRES_DB:-jobai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: builder
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

  worker:
    image: curlimages/curl:latest
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/worker.sh"]
    environment:
      APP_URL: http://app:3000
      CRON_SECRET: ${CRON_SECRET}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-21600}
      SYNC_QUERY: ${SYNC_QUERY:-}
      SYNC_WHERE: ${SYNC_WHERE:-}
    volumes:
      - ./docker/worker.sh:/worker.sh:ro
    depends_on:
      - app

  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/backup.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-jobai}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
    volumes:
      - ./docker/backup.sh:/backup.sh:ro
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  jobai-db-data:
  caddy-data:
  caddy-config:
